{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon" style="width:48px;height:48px;border-radius:12px;">
        <i data-lucide="recycle" class="icon-md"></i>
      </div>
    </div>
    <div class="auth-title">Welcome Back</div>
    <div class="auth-sub">Sign in to your EcoTrack account</div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label">Email Address <span class="required">*</span></label>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span class="required">*</span></label>
        <input type="password" name="password" class="form-control"
               placeholder="Your password" required>
      </div>
      <div class="flex items-center justify-between mb-4" style="font-size:13px;">
        <label class="flex items-center gap-2" style="cursor:pointer;">
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="{{ url_for('auth.forgot_password') }}"
           style="color:var(--green-600);font-weight:600;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">
        <i data-lucide="log-in" class="icon-sm"></i> Sign In
      </button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
