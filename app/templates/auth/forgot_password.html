{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon" style="width:48px;height:48px;border-radius:12px;">
        <i data-lucide="key-round" class="icon-md"></i>
      </div>
    </div>
    <div class="auth-title">Reset Password</div>
    <div class="auth-sub">Enter your email and we'll send reset instructions</div>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <div class="form-group">
        <label class="form-label">Email Address <span class="required">*</span></label>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">
        <i data-lucide="send" class="icon-sm"></i> Send Reset Link
      </button>
    </form>

    <div class="auth-switch">
      Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
