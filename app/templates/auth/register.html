{% extends "base.html" %}
{% block title %}Create Account{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <div class="brand-icon" style="width:48px;height:48px;border-radius:12px;">
        <i data-lucide="recycle" class="icon-md"></i>
      </div>
    </div>
    <div class="auth-title">Create Account</div>
    <div class="auth-sub">Join EcoTrack and start scheduling pickups</div>

    <!-- Only resident and collector — admin accounts are created by the admin panel -->
    <div class="role-tabs">
      <button type="button" class="role-tab active" onclick="setRole('resident', this)">
        <i data-lucide="user" class="icon-xs"></i> Resident
      </button>
      <button type="button" class="role-tab" onclick="setRole('collector', this)">
        <i data-lucide="truck" class="icon-xs"></i> Collector
      </button>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="role" id="role-input" value="resident">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" name="full_name" class="form-control"
                 placeholder="Jean Hounkpatin" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 placeholder="+229 00 00 00 00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address <span class="required">*</span></label>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password <span class="required">*</span></label>
          <input type="password" name="password" class="form-control"
                 placeholder="Min 8 characters" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password <span class="required">*</span></label>
          <input type="password" name="confirm_password" class="form-control"
                 placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">
        <i data-lucide="user-plus" class="icon-sm"></i> Create Account
      </button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
<script>
function setRole(role, el) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('role-input').value = role;
}
</script>
{% endblock %}
